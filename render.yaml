services:
  - type: web
    name: youtube-ai-search
    env: python
    region: oregon
    plan: starter          # Persistent Diskは有料プランが必要
    buildCommand: |
      pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ADMIN_USER
        value: admin
      - key: ADMIN_PASS
        sync: false
      - key: DATA_DIR
        value: /data        # Persistent DiskのマウントパスをDATA_DIRで渡す
    disk:
      name: toray-acs-data
      mountPath: /data      # Diskのマウントパス
      sizeGB: 5             # 初期5GB（後から増やせる・減らせない）
